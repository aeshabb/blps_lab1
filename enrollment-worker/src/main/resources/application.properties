spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/skillbox}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Отключаем data.sql — схема управляется enrollment-api
spring.sql.init.mode=never

# RabbitMQ AMQP 1.0 (Apache Qpid JMS)
rabbitmq.amqp.url=${RABBITMQ_AMQP_URL:amqp://guest:guest@localhost:5672}

# Open edX
services.openedx.base-url=${OPENEDX_BASE_URL:http://localhost:18000}
services.openedx.host-header=${OPENEDX_HOST_HEADER:mamochki}
services.openedx.auth-token=${OPENEDX_AUTH_TOKEN:}
services.openedx.default-password=${OPENEDX_DEFAULT_PASSWORD:Lab1Pass_2026}
services.openedx.enrollment-mode=${OPENEDX_ENROLLMENT_MODE:audit}

# Bank (mock endpoint живёт на enrollment-api)
api.port=${API_PORT:8080}
services.bank.url=http://localhost:${api.port}/api/mock/bank

# CRM (mock endpoint живёт на enrollment-api)
services.crm.url=http://localhost:${api.port}

# Отключаем web-сервер у воркера — только фоновая обработка
spring.main.web-application-type=none

server.port=${WORKER_PORT:8081}
