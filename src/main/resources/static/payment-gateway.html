<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Платежный шлюз</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container { max-width: 720px; margin-top: 48px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card p-4 shadow-sm">
        <h3 class="mb-3">Оплата курса</h3>
        <p class="text-muted">Вы находитесь на отдельном endpoint платежной системы.</p>
        <p>Заявка: <strong id="appIdLabel">-</strong></p>

        <div class="mb-3">
            <label class="form-label">Тестовая карта</label>
            <select class="form-select" id="cardMode">
                <option value="SUCCESS">Успешная оплата</option>
                <option value="FAILED">Отказ банка</option>
            </select>
        </div>

        <div class="d-grid gap-2 d-md-flex">
            <button class="btn btn-success" id="payBtn">Оплатить</button>
            <a class="btn btn-outline-secondary" id="backBtn" href="/">Вернуться без оплаты</a>
        </div>

        <div id="resultBox" class="alert d-none mt-3" role="alert"></div>
    </div>
</div>

<script src="payment-gateway.js"></script>
</body>
</html>
